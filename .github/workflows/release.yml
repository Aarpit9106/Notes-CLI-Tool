name: Release Standalone Binaries

on:
  release:
    types: [created]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: notes
            asset_name: notes-linux-amd64
          - os: windows-latest
            artifact_name: notes.exe
            asset_name: notes-windows-amd64.exe
          - os: macos-latest
            artifact_name: notes
            asset_name: notes-macos-amd64

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller click rich
        pip install -e .
        
    - name: Build executable with PyInstaller
      run: |
        pyinstaller --onefile --name notes notes/cli.py
        
    - name: Rename Release Asset
      shell: bash
      run: |
        mv dist/${{ matrix.artifact_name }} dist/${{ matrix.asset_name }}
        
    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        files: dist/${{ matrix.asset_name }}
